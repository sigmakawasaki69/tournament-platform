<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація команди на турнір</title>
    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f4f6fb;
            padding:30px 20px;
        }
        .wrap{
            max-width:700px;
            margin:0 auto;
        }
        .card{
            background:white;
            padding:24px;
            border-radius:16px;
            box-shadow:0 10px 24px rgba(0,0,0,.06);
        }
        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
        }
        select,.form-input{
            width:100%;
            padding:10px 12px;
            margin-bottom:12px;
            border:1px solid #d0d7e2;
            border-radius:10px;
            box-sizing:border-box;
        }
        button{
            border:none;
            background:#2563eb;
            color:white;
            padding:10px 16px;
            border-radius:10px;
            cursor:pointer;
        }
        a{
            margin-left:10px;
            color:#2563eb;
            text-decoration:none;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Реєстрація команди на турнір "{{ tournament.name }}"</h1>

            <form method="post">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit">Зареєструвати команду</button>
                <a href="/participant-dashboard/">Назад</a>
            </form>
        </div>
    </div>
</body>
</html>
