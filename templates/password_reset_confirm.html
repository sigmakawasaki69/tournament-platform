{% extends "auth_base.html" %}

{% block title %}Новий пароль{% endblock %}

{% block content %}
    <div class="auth-card">
        <h1 class="page-title" style="text-align:center;">Новий пароль</h1>
        <p class="section-note" style="text-align:center; margin-top:10px;">
            Введіть новий пароль для вашого акаунта.
        </p>

        {% if messages %}
            {% for message in messages %}
                <div class="message-box {% if message.tags == 'error' %}error{% else %}warn{% endif %} spacer-top">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" class="spacer-top">
            {% csrf_token %}
            <div class="field-group">
                <label for="password">Новий пароль</label>
                <input type="password" name="password" id="password" required minlength="8">
            </div>

            <div class="field-group spacer-top">
                <label for="confirm_password">Підтвердіть пароль</label>
                <input type="password" name="confirm_password" id="confirm_password" required minlength="8">
            </div>

            <div class="spacer-top">
                <button class="button" type="submit" style="width:100%;">Змінити пароль</button>
            </div>
        </form>
    </div>
{% endblock %}
