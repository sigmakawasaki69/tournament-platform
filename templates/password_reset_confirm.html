{% extends "auth_base.html" %}

{% block title %}<span data-i18n="auth.reset_password.title">Новий пароль</span>{% endblock %}

{% block auth_content %}
    <div class="auth-card">
        <h1 class="page-title" style="text-align:center;" data-i18n="auth.reset_password.title">Новий пароль</h1>
        <p class="section-note" style="text-align:center; margin-top:10px;" data-i18n="auth.reset_password.subtitle">
            Придумайте новий надійний пароль для вашого акаунта.
        </p>

        {% if messages %}
            {% for message in messages %}
                <div class="message-box {% if message.tags == 'error' %}error{% else %}warn{% endif %} spacer-top" data-i18n-message>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" class="spacer-top">
            {% csrf_token %}
            <div class="field-group">
                <label for="new_password" data-i18n="login.password">Пароль</label>
                <input type="password" name="new_password" id="new_password" required data-i18n-placeholder="auth.reset_password.subtitle">
            </div>

            <div class="field-group spacer-top">
                <label for="confirm_password" data-i18n="auth.reset_password.confirm">Підтвердіть пароль</label>
                <input type="password" name="confirm_password" id="confirm_password" required minlength="8">
            </div>

            <div class="spacer-top">
                <button class="button" type="submit" style="width:100%;" data-i18n="auth.reset_password.submit">Змінити пароль</button>
            </div>
        </form>
    </div>
{% endblock %}
